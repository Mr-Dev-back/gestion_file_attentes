
services:
  postgres:
    image: postgres:15-alpine
    container_name: gesparc-prod-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-gesparc}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_pd_data:/var/lib/postgresql/data
    networks:
      - gesparc-prod-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-gesparc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gesparc-prod-redis
    restart: always
    volumes:
      - redis_pd_data:/data
    networks:
      - gesparc-prod-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: gesparc-prod-backend
    restart: always
    ports:
      - "3003:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-gesparc}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN}
      FASTAPI_URL: http://fastapi:8082
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gesparc-prod-net

  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    container_name: gesparc-prod-fastapi
    restart: always
    expose:
      - "8082"
    networks:
      - gesparc-prod-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_WS_URL=${VITE_WS_URL}
    container_name: gesparc-prod-frontend
    restart: always
    ports:
      - "3006:80"
    depends_on:
      - backend
    networks:
      - gesparc-prod-net

volumes:
  postgres_pd_data:
  redis_pd_data:

networks:
  gesparc-prod-net:
    driver: bridge
