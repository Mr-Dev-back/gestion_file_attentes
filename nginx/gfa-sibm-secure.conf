# ═══════════════════════════════════════════════════════════════
# GesParc SIBM — Nginx Secure Configuration (SSL/TLS)
# ═══════════════════════════════════════════════════════════════

# --- Redirection HTTP → HTTPS ---
server {
    listen 80;
    server_name gesparc.sibm.ci gesparc.sibm.ci 192.168.11.189;

    # Exception pour le challenge ACME de Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirection stricte vers HTTPS pour tout le reste
    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Serveur HTTPS principal ---
server {
    listen 443 ssl http2;
    server_name gesparc.sibm.ci gesparc.sibm.ci 192.168.11.189;

    # ─── Certificats SSL (Let's Encrypt / Certbot) ───
    ssl_certificate     /etc/letsencrypt/live/gesparc.sibm.ci/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gesparc.sibm.ci/privkey.pem;

    # ─── Protocole SSL durci (A+ sur SSLLabs) ───
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ─── OCSP Stapling ───
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ─── Headers de sécurité critiques (Protection JWT/XSS/Clickjacking) ───
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' wss://$host ws://$host https://$host http://$host; frame-ancestors 'self';" always;

    # ─── Sécurité serveur ───
    server_tokens off;

    # ─── Logs ───
    access_log /var/log/nginx/gesparc-sibm-access.log;
    error_log  /var/log/nginx/gesparc-sibm-error.log;

    # ─── Limites ───
    client_max_body_size 50M;

    # ─── Frontend — Fichiers statiques ───
    location / {
        root /home/ftuser/gesparc-sibm/frontend/dist;
        try_files $uri $uri/ /index.html;

        # Cache longue durée pour les assets immutables
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ─── Backend API — Proxy vers Node.js (8081) ───
    location /api {
        proxy_pass http://[IP_ADDRESS];
        proxy_http_version 1.1;

        # Headers critiques pour informer Node.js du HTTPS original
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # ─── FastAPI — gTTS et traitement Python (8082) ───
    location /fastapi {
        rewrite ^/fastapi/(.*) /$1 break;
        proxy_pass http://[IP_ADDRESS];
        proxy_http_version 1.1;

        # Headers critiques pour informer FastAPI du HTTPS original
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ─── Socket.IO — WebSocket (8081) ───
    location /socket.io {
        proxy_pass http://[IP_ADDRESS];
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 7d;
        proxy_send_timeout 7d;
        proxy_read_timeout 7d;
    }

    # ─── Gzip ───
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;
}
