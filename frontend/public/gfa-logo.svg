<svg xmlns="http://www.w3.org/2000/svg" viewBox="20 5 200 70" width="200" height="70">
  <!-- CAMION DE CHARGEMENT -->
  
  <!-- Cabine (Vert SIBM) -->
  <g id="cabine">
    <rect x="40" y="25" width="35" height="35" fill="#1a7f37" stroke="#111827" stroke-width="2" rx="2"/>
    <!-- Pare-brise -->
    <polygon points="70,27 73,27 73,45 70,50" fill="#93c5fd" stroke="#111827" stroke-width="1.5"/>
    <!-- Fenêtre -->
    <rect x="45" y="30" width="20" height="15" fill="#93c5fd" stroke="#111827" stroke-width="1.5" rx="1"/>
    <!-- Phare -->
    <circle cx="42" cy="55" r="2" fill="#fbbf24"/>
  </g>
  
  <!-- Benne de chargement (Gris clair avec texte GFA SIBM) -->
  <g id="benne">
    <rect x="75" y="10" width="140" height="50" fill="#f3f4f6" stroke="#111827" stroke-width="2.5" rx="2"/>
    
    <!-- Texte GFA SIBM sur la benne -->
    <text x="145" y="30" 
          font-family="Arial, sans-serif" 
          font-size="18" 
          font-weight="bold" 
          text-anchor="middle" 
          fill="#1a7f37">GFA</text>
    
    <text x="145" y="50" 
          font-family="Arial, sans-serif" 
          font-size="18" 
          font-weight="bold" 
          text-anchor="middle" 
          fill="#dc2626">SIBM</text>
    
    <!-- Détails benne -->
    <line x1="75" y1="35" x2="215" y2="35" stroke="#d1d5db" stroke-width="1"/>
  </g>
  
  <!-- Châssis -->
  <rect x="40" y="58" width="175" height="4" fill="#111827" rx="1"/>
  
  <!-- Roues -->
  <g id="roues">
    <!-- Roue avant -->
    <circle cx="55" cy="62" r="12" fill="#111827" stroke="#374151" stroke-width="2.5"/>
    <circle cx="55" cy="62" r="6" fill="#6b7280"/>
    <circle cx="55" cy="62" r="2.5" fill="#111827"/>
    
    <!-- Roue arrière 1 -->
    <circle cx="170" cy="62" r="12" fill="#111827" stroke="#374151" stroke-width="2.5"/>
    <circle cx="170" cy="62" r="6" fill="#6b7280"/>
    <circle cx="170" cy="62" r="2.5" fill="#111827"/>
    
    <!-- Roue arrière 2 -->
    <circle cx="195" cy="62" r="12" fill="#111827" stroke="#374151" stroke-width="2.5"/>
    <circle cx="195" cy="62" r="6" fill="#6b7280"/>
    <circle cx="195" cy="62" r="2.5" fill="#111827"/>
  </g>
</svg>
